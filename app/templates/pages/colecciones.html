<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ images['icons']['favicon'] }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/colecciones.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/pages/colecciones.js') }}"></script>
    <title>TNGLore - Colecciones</title>
</head>
<body>
    {% include 'components/header.html' %}

    <main class="container mx-auto px-4 py-8">
        
        <!-- Indicador de carga -->
        <div id="loading-indicator" class="loading-spinner" style="display: none;">
            <p>Cargando colecciones...</p>
        </div>

        <!-- Barra de filtros -->
        <div id="filtros-colecciones" class="filtros-bar">
            <input type="text" id="buscar-cartas" placeholder="Buscar carta..." autocomplete="off">
            <select id="filtro-rareza">
                <option value="">Todas las rarezas</option>
                <option value="comun">Común</option>
                <option value="rara">Rara</option>
                <option value="epica">Épica</option>
                <option value="legendaria">Legendaria</option>
            </select>
            <select id="filtro-coleccion">
                <option value="">Todas las colecciones</option>
            </select>
            <button id="limpiar-filtros" class="btn-limpiar">Limpiar</button>
        </div>
        
        <div id="contenedor-colecciones" class="collection-grid"></div>
        
        <!-- Indicador de estado de conexión -->
        <div id="connection-status" class="connection-status"></div>
    </main>

    <!-- Overlay para mostrar detalles -->
    <div id="overlay" class="overlay" style="display: none;">
        <div class="overlay-content"></div>
    </div>

</body>
</html>
