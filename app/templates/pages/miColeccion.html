<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ images['icons']['favicon'] }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/miColeccion.css') }}">
    <title>TNGLore - Mi Colección</title>
</head>
<body>
    <!-- Encabezado -->
    {% include 'components/header.html' %}

    <!-- Contenido principal -->
    <main>
        <!-- Controles de búsqueda, filtros y ordenación -->
        <div id="sorting-controls" class="filtros-bar">
            <input type="text" id="buscar-cartas" placeholder="Buscar carta..." autocomplete="off">
            <label for="sort-select">Ordenar por:</label>
            <select id="sort-select">
                <option value="nombre">Nombre</option>
                <option value="rareza">Rareza</option>
            </select>
            <select id="filtro-rareza">
                <option value="">Todas las rarezas</option>
                <option value="comun">Común</option>
                <option value="rara">Rara</option>
                <option value="epica">Épica</option>
                <option value="legendaria">Legendaria</option>
            </select>
            <select id="filtro-servidor">
                <option value="">Todos los servidores</option>
            </select>
            <select id="filtro-estado">
                <option value="">Todas</option>
                <option value="tengo">Tengo</option>
                <option value="no-tengo">No tengo</option>
            </select>
            <button id="limpiar-filtros" class="btn-limpiar">Limpiar</button>
        </div>

        <!-- Contenedor para servidores y sus cartas -->
        <div id="guilds-container"></div>

        <!-- Mensaje cuando el usuario no tiene cartas -->
        <div id="no-cards-message" style="display:none">
            <p id="no-cards-text">No tienes cartas en tu colección todavía.</p>
        </div>
    </main>

    <!-- Overlay -->
    <div id="overlay" class="overlay" style="display: none;">
        <div class="overlay-content">
            <!-- Contenido del overlay se carga dinámicamente -->
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="{{ url_for('static', filename='js/pages/miColeccion.js') }}"></script>
</body>
</html>
