<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ images['icons']['favicon'] }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/admin.css') }}">
    <script src="{{ url_for('static', filename='js/pages/admin.js') }}" defer></script>
    <title>TNGLore - Panel de Administrador</title>
</head>
<body>
    {% include 'components/header.html' %}

    <main class="admin-panel">
        <h1>Panel de Administrador</h1>
        
        <!-- Indicador de carga global -->
        <div id="loading-indicator" class="loading-spinner" style="display: none;">
            <p>Cargando datos de administración...</p>
        </div>

        <section id="cartas-section" class="admin-section">
            <h2>Gestión de Cartas</h2>
            <div class="section-header">
                <input type="text" id="cartas-search" class="admin-search-input" placeholder="Buscar carta o colección..." autocomplete="off">
                <select id="admin-filtro-rareza" class="sort-dropdown">
                    <option value="">Todas las rarezas</option>
                    <option value="comun">Común</option>
                    <option value="rara">Rara</option>
                    <option value="epica">Épica</option>
                    <option value="legendaria">Legendaria</option>
                </select>
                <select id="cartas-sort" class="sort-dropdown">
                    <option value="" selected disabled>Ordenar por...</option>
                    <option value="nombre">Ordenar por Nombre</option>
                    <option value="rareza">Ordenar por Rareza</option>
                    <option value="coleccion">Ordenar por Colección</option>
                </select>
            </div>
            <div id="cartas-list"></div>
            <button id="nueva-carta-btn" class="admin-btn">Crear Nueva Carta</button>
        </section>

        <section id="colecciones-section" class="admin-section">
            <h2>Gestión de Colecciones</h2>
            <div class="section-header">
                <input type="text" id="colecciones-search" class="admin-search-input" placeholder="Buscar colección..." autocomplete="off">
                <select id="colecciones-sort" class="sort-dropdown">
                    <option value="" selected disabled>Ordenar por...</option>
                    <option value="nombre">Ordenar por Nombre</option>
                </select>
            </div>
            <div id="colecciones-list"></div>
            <button id="nueva-coleccion-btn" class="admin-btn">Crear Nueva Colección</button>
        </section>

        <section id="usuarios-section" class="admin-section">
            <h2>Gestión de Usuarios</h2>
            <div class="section-header">
                <input type="text" id="usuarios-search" class="admin-search-input" placeholder="Buscar usuario..." autocomplete="off">
                <select id="usuarios-sort" class="sort-dropdown">
                    <option value="" selected disabled>Ordenar por...</option>
                    <option value="nombre">Ordenar por Nombre de Usuario</option>
                    <option value="cartas">Ordenar por Número de Cartas</option>
                    <option value="cofres">Ordenar por Número de Cofres</option>
                </select>
            </div>
            <div id="usuarios-list"></div>
        </section>

        <section id="codigos-section" class="admin-section">
            <h2>Gestión de Códigos</h2>
            <div class="section-header">
                <input type="text" id="codigos-search" class="admin-search-input" placeholder="Buscar código o descripción..." autocomplete="off">
                <select id="codigos-filter" class="sort-dropdown">
                    <option value="all">Todos</option>
                    <option value="available">Disponibles</option>
                    <option value="assigned">Asignados</option>
                </select>
            </div>
            <div id="codigos-list"></div>
            <button id="nuevo-codigo-btn" class="admin-btn">Añadir Código</button>
        </section>

        <section id="eventos-section" class="admin-section">
            <h2>Gestión de Eventos</h2>
            <div class="section-header">
                <input type="text" id="eventos-search" class="admin-search-input" placeholder="Buscar evento..." autocomplete="off">
                <select id="eventos-filter" class="sort-dropdown">
                    <option value="all">Todos</option>
                    <option value="active">Activos</option>
                    <option value="inactive">Inactivos</option>
                </select>
            </div>
            <div id="eventos-list"></div>
            <button id="nuevo-evento-btn" class="admin-btn">Crear Nuevo Evento</button>
        </section>
    </main>

    <!-- Modales para crear/editar cartas y colecciones -->
    <div id="carta-modal" class="modal">
        <div class="modal-content">
            <h2 id="carta-modal-title">Crear/Editar Carta</h2>
            <form id="carta-form" data-id="">
                <input type="text" id="carta-nombre" name="nombre" placeholder="Nombre de la carta" required>
                <textarea id="carta-descripcion" name="descripcion" placeholder="Descripción de la carta" required></textarea>
                <select id="carta-rareza" name="rareza" required>
                    <option value="">Seleccione rareza</option>
                    <option value="comun">Común</option>
                    <option value="rara">Rara</option>
                    <option value="epica">Épica</option>
                    <option value="legendaria">Legendaria</option>
                </select>
                <select id="carta-coleccion" name="coleccion" required>
                    <option value="">Seleccione colección</option>
                </select>
                <label for="carta-imagen">Imagen (anverso):</label>
                <input type="file" id="carta-imagen" name="imagen" accept="image/*">
                <label for="carta-reverso">Imagen (reverso):</label>
                <input type="file" id="carta-reverso" name="imagen_reverso" accept="image/*">
                <button type="submit" class="admin-btn">Guardar</button>
                <button type="button" class="admin-btn cancel-btn">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="coleccion-modal" class="modal">
        <div class="modal-content">
            <h2 id="coleccion-modal-title">Crear/Editar Colección</h2>
            <form id="coleccion-form" enctype="multipart/form-data">
                <input type="text" id="coleccion-nombre" name="nombre" placeholder="Nombre de la colección" required>
                <textarea id="coleccion-descripcion" name="descripcion" placeholder="Descripción de la colección" required></textarea>
                <input type="file" id="coleccion-imagen" name="imagen" accept="image/*">
                <button type="submit" class="admin-btn">Guardar</button>
                <button type="button" class="admin-btn cancel-btn">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="usuario-modal" class="modal">
        <div class="modal-content">
            <h2 id="usuario-modal-title">Gestionar Usuario</h2>
            <form id="usuario-form">
                <input type="password" id="usuario-password" placeholder="Nueva contraseña">
                <button type="submit" class="admin-btn">Cambiar Contraseña</button>
                <div class="toggle-row">
                    <label for="usuario-deny-code">Denegar código (global — afecta a todos los eventos):</label>
                    <input type="checkbox" id="usuario-deny-code">
                </div>
                <div class="reset-section">
                    <label class="small-label">Resetear datos del usuario</label>
                    <div class="reset-buttons">
                        <button type="button" class="admin-btn reset-btn" id="reset-chests-btn">Resetear Cofres</button>
                        <button type="button" class="admin-btn reset-btn" id="reset-cards-btn">Resetear Cartas</button>
                        <button type="button" class="admin-btn reset-btn danger-btn" id="reset-all-btn">Resetear Todo</button>
                    </div>
                </div>
                <div class="events-progress-section" id="usuario-events-section">
                    <label class="small-label">Progreso en eventos</label>
                    <div id="usuario-events-list" class="usuario-events-list"></div>
                </div>
                <button type="button" id="eliminar-usuario-btn" class="admin-btn delete-btn">Eliminar Usuario</button>
                <button type="button" class="admin-btn cancel-btn">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="codigo-modal" class="modal">
        <div class="modal-content">
            <h2 id="codigo-modal-title">Añadir Código</h2>
            <form id="codigo-form" data-id="">
                <input type="text" id="codigo-code" placeholder="Código" required>
                <input type="text" id="codigo-description" placeholder="Descripción (opcional)">
                <input type="url" id="codigo-link" placeholder="Enlace de canje (opcional)">
                <input type="number" id="codigo-max-uses" placeholder="Usos máximos (vacío = 1, 0 = ilimitado)" min="0">
                <label for="codigo-max-uses" class="small-label">Usos máximos (vacío = 1, 0 = ilimitado)</label>
                <input type="datetime-local" id="codigo-expires">
                <label for="codigo-expires" class="small-label">Fecha de expiración (opcional)</label>
                <button type="submit" class="admin-btn">Guardar</button>
                <button type="button" class="admin-btn cancel-btn">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="evento-modal" class="modal">
        <div class="modal-content modal-content-wide">
            <h2 id="evento-modal-title">Crear Evento</h2>
            <form id="evento-form" data-id="">
                <input type="text" id="evento-nombre" placeholder="Nombre del evento" required>
                <textarea id="evento-descripcion" placeholder="Descripción (opcional)"></textarea>
                <div class="form-row">
                    <div class="form-group">
                        <label class="small-label">Fecha de inicio</label>
                        <input type="datetime-local" id="evento-start">
                    </div>
                    <div class="form-group">
                        <label class="small-label">Fecha de fin (opcional)</label>
                        <input type="datetime-local" id="evento-end">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="small-label">Número de días</label>
                        <input type="number" id="evento-days" min="1" max="30" value="7" required>
                    </div>
                    <div class="form-group">
                        <div class="toggle-row">
                            <label for="evento-active">Activo:</label>
                            <input type="checkbox" id="evento-active" checked>
                        </div>
                    </div>
                </div>
                <div id="evento-rewards-builder" class="rewards-builder">
                    <label class="small-label">Recompensas por día</label>
                    <div id="evento-rewards-list" class="rewards-list"></div>
                </div>
                <button type="submit" class="admin-btn">Guardar</button>
                <button type="button" class="admin-btn cancel-btn">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div class="overlay-content">
            <!-- Contenido del overlay se carga dinámicamente -->
        </div>
    </div>
</body>
</html>
